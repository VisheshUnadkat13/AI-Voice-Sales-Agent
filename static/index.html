<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>AI Voice Sales Agent — Call Console</title>
    <style>
        :root {
            --bg: #0f1a17;
            --panel: #16241f;
            --line: #24362f;
            --text: #e9efec;
            --muted: #8aa39a;
            --accent: #3ddc97;
            --accent-dim: #21493a;
            --agent: #3ddc97;
            --lead: #f2c078;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "SF Mono", "Consolas", monospace;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 16px;
        }

        .console {
            width: 100%;
            max-width: 640px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--line);
            padding-bottom: 14px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 15px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
            margin: 0;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            margin-right: 6px;
        }

        .status-dot.live {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .lead-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 16px 18px;
            margin-bottom: 20px;
        }

        .lead-card .name {
            font-size: 18px;
            font-weight: 600;
        }

        .lead-card .company {
            color: var(--muted);
            font-size: 13px;
            margin-top: 2px;
        }

        .transcript {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 6px;
            min-height: 260px;
            max-height: 420px;
            overflow-y: auto;
            padding: 16px 18px;
            margin-bottom: 20px;
        }

        .line {
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .line .who {
            font-weight: 700;
            margin-right: 6px;
        }

        .line.agent .who {
            color: var(--agent);
        }

        .line.lead .who {
            color: var(--lead);
        }

        .line.system {
            color: var(--muted);
            font-style: italic;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            font-family: inherit;
            border: none;
            border-radius: 6px;
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
        }

        #startBtn {
            background: var(--accent);
            color: #06231a;
            width: 100%;
        }

        #startBtn:disabled {
            background: var(--accent-dim);
            color: var(--muted);
            cursor: not-allowed;
        }

        #talkBtn {
            flex: 1;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent);
            user-select: none;
        }

        #talkBtn.recording {
            background: var(--accent);
            color: #06231a;
        }

        #talkBtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #endBtn {
            background: transparent;
            color: #e07a5f;
            border: 1px solid #e07a5f;
        }

        #endBtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }

        .summary {
            margin-top: 20px;
            background: var(--panel);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 16px 18px;
            font-size: 13px;
            display: none;
        }

        .summary h2 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin: 0 0 10px;
        }

        .summary div {
            margin-bottom: 6px;
            color: var(--text);
        }

        .summary span {
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="console">
        <div class="header">
            <h1><span class="status-dot" id="statusDot"></span>Voice Sales Agent — Call Console</h1>
            <span id="statusText" style="color:var(--muted); font-size:12px;">idle</span>
        </div>

        <div class="lead-card" id="leadCard" style="display:none;">
            <div class="name" id="leadName">—</div>
            <div class="company" id="leadCompany">—</div>
        </div>

        <div class="transcript" id="transcript">
            <div class="line system">Press "Start Call" to pull the next pending lead and begin.</div>
        </div>

        <button id="startBtn" onclick="startCall()">Start Call</button>

        <div class="controls" style="margin-top:12px;">
            <button id="talkBtn" disabled onmousedown="startRecording()" onmouseup="stopRecording()"
                onmouseleave="cancelIfRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">
                Hold to Talk
            </button>
            <button id="endBtn" disabled onclick="endCall()">End Call</button>
        </div>
        <div class="hint">Hold the button while you speak, release to send. Playback happens automatically.</div>

        <div class="summary" id="summary">
            <h2>Call Result → written to Excel CRM</h2>
            <div><span>Status:</span> <span id="s_status"></span></div>
            <div><span>Qualification:</span> <span id="s_qual"></span></div>
            <div><span>Summary:</span> <span id="s_summary"></span></div>
            <div><span>Requirements:</span> <span id="s_req"></span></div>
            <div><span>Objections:</span> <span id="s_obj"></span></div>
            <div><span>Meeting:</span> <span id="s_meeting"></span></div>
        </div>
    </div>

    <audio id="player" style="display:none;"></audio>

    <script>
        let sessionId = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recording = false;

        const transcriptEl = document.getElementById('transcript');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const talkBtn = document.getElementById('talkBtn');
        const endBtn = document.getElementById('endBtn');
        const startBtn = document.getElementById('startBtn');
        const player = document.getElementById('player');

        function addLine(who, text) {
            const div = document.createElement('div');
            div.className = 'line ' + who;
            div.innerHTML = `<span class="who">${who === 'agent' ? 'Agent:' : who === 'lead' ? 'You:' : ''}</span>${text}`;
            transcriptEl.appendChild(div);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }

        function setStatus(live, text) {
            statusDot.classList.toggle('live', live);
            statusText.textContent = text;
        }

        async function playAudio(url) {
            return new Promise((resolve) => {
                player.src = url;
                player.onended = resolve;
                player.play();
            });
        }

        async function startCall() {
            startBtn.disabled = true;
            setStatus(true, 'connecting...');
            transcriptEl.innerHTML = '';
            document.getElementById('summary').style.display = 'none';

            const res = await fetch('/api/start_call', { method: 'POST' });
            if (!res.ok) {
                addLine('system', 'No pending leads found, or server error. Check the terminal running server.py.');
                setStatus(false, 'idle');
                startBtn.disabled = false;
                return;
            }
            const data = await res.json();
            sessionId = data.session_id;

            document.getElementById('leadCard').style.display = 'block';
            document.getElementById('leadName').textContent = data.lead_name;
            document.getElementById('leadCompany').textContent = data.company;

            addLine('agent', data.agent_text);
            setStatus(true, 'call live');
            talkBtn.disabled = false;
            endBtn.disabled = false;
            await playAudio(data.audio_url);
        }

        async function startRecording() {
            if (!sessionId || recording) return;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.start();
            recording = true;
            talkBtn.classList.add('recording');
            talkBtn.textContent = 'Listening...';
        }

        function cancelIfRecording() {
            if (recording) stopRecording();
        }

        async function stopRecording() {
            if (!recording || !mediaRecorder) return;
            recording = false;
            talkBtn.classList.remove('recording');
            talkBtn.textContent = 'Processing...';
            talkBtn.disabled = true;

            mediaRecorder.stop();
            await new Promise(resolve => mediaRecorder.onstop = resolve);
            mediaRecorder.stream.getTracks().forEach(t => t.stop());

            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('session_id', sessionId);
            formData.append('audio', blob, 'turn.webm');

            const res = await fetch('/api/turn', { method: 'POST', body: formData });
            const data = await res.json();

            addLine('lead', data.lead_text);
            addLine('agent', data.agent_text);
            setStatus(true, 'call live');

            await playAudio(data.audio_url);

            talkBtn.disabled = false;
            talkBtn.textContent = 'Hold to Talk';

            if (data.call_should_end) {
                addLine('system', 'Agent appears to be wrapping up the call.');
            }
        }

        async function endCall() {
            if (!sessionId) return;
            talkBtn.disabled = true;
            endBtn.disabled = true;
            setStatus(false, 'summarizing...');

            const formData = new FormData();
            formData.append('session_id', sessionId);
            const res = await fetch('/api/end_call', { method: 'POST', body: formData });
            const data = await res.json();

            addLine('system', 'Call ended. CRM updated.');
            setStatus(false, 'idle');

            const s = data.summary;
            document.getElementById('s_status').textContent = s.call_status || '—';
            document.getElementById('s_qual').textContent = s.lead_qualification || '—';
            document.getElementById('s_summary').textContent = s.conversation_summary || '—';
            document.getElementById('s_req').textContent = s.customer_requirements || '—';
            document.getElementById('s_obj').textContent = s.objections_raised || '—';
            document.getElementById('s_meeting').textContent = s.meeting_datetime || s.follow_up_date || '—';
            document.getElementById('summary').style.display = 'block';

            startBtn.disabled = false;
            sessionId = null;
        }
    </script>
</body>

</html>
